<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireGeek - Usuário</title>
    <script src="./js/sessao.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <section class="section_menu">
        <div class="div_ola">
            <img src="./assets/imgs/artistas/7mz_artistas.jpg">
            <span>Olá, nickname</span>
        </div>
        <hr>
        <a href="./forum.html">Fórum</a>
        <p>Configurações</p>
        <p onclick="limparSessao()">Sair</p>
    </section>
    <section class="graficos">
        <div class="div_superior">
            <div class="grafico_qtd_interacoes">
                <p>Sua quantidade de interações por semana</p>
                <canvas id="chartQtdInteracoes"></canvas>
            </div>
            <div class="artista_favorito">
                <a class="link_artista" href="${artistas.link}" target="_blank">
                    <div class="card_artista">
                        <img src="${artistas.foto}" alt="${artistas.nome}">
                        <span>${artistas.nome}</span>
                    </div>
                </a>
                <p>Seu artista Favorito</p>
            </div>
        </div>
        <div class="div_inferior">
            <div class="grafico_categoria">
                <canvas id="chartCategoria"></canvas>
                <p>Categorias em que mais interagiu</p>
            </div>
            <div class="grafico_artistas_mencionados">
                <p>Top 10 Artistas mais mencionados da semana</p>
                <canvas id="chartArtistasMencionados"></canvas>
            </div>
        </div>
    </section>
</body>

</html>
